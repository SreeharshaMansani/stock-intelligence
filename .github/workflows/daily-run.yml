name: Wake and Trigger Stock Intelligence

on:
  workflow_dispatch: # Manual trigger only — daily scheduling handled by cron-job.org

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render (wait for cold-start)
        run: |
          echo "Sending wake-up ping to /wake..."
          for i in {1..10}; do
            echo "Wake attempt $i..."
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "https://stock-intelligence-yjsf.onrender.com/wake")
            echo "HTTP Status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Render is awake!"
              break
            fi
            echo "Not ready yet, waiting 15 seconds..."
            sleep 15
          done

      - name: Trigger pipeline via /api/cron-trigger
        run: |
          echo "Triggering stock intelligence pipeline..."
          for i in {1..5}; do
            echo "Trigger attempt $i..."
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 60 "https://stock-intelligence-yjsf.onrender.com/api/cron-trigger")
            echo "HTTP Status: $RESPONSE"
            if [ "$RESPONSE" = "200" ]; then
              echo "Pipeline triggered successfully!"
              exit 0
            fi
            echo "Sleeping 20 seconds before retry..."
            sleep 20
          done
          echo "Failed to trigger pipeline within 5 attempts."
          exit 1
